services:
  recipeboxx_recipe.schema_parser:
    class: Drupal\recipeboxx_recipe\Service\SchemaOrgParser
    arguments: ['@http_client']

  recipeboxx_recipe.ai_parser:
    class: Drupal\recipeboxx_recipe\Service\AiFallbackParser

  recipeboxx_recipe.scraper:
    class: Drupal\recipeboxx_recipe\Service\RecipeScraperService
    arguments:
      - '@recipeboxx_recipe.schema_parser'
      - '@recipeboxx_recipe.ai_parser'

  recipeboxx_recipe.clone_service:
    class: Drupal\recipeboxx_recipe\Service\RecipeCloneService

  recipeboxx_recipe.clone_access_check:
    class: Drupal\recipeboxx_recipe\Access\RecipeCloneAccessCheck
    tags:
      - { name: access_check, applies_to: _custom_access }

  # Phase 1: Search and Nutrition Services
  recipeboxx_recipe.search:
    class: Drupal\recipeboxx_recipe\Service\RecipeSearchService
    arguments: ['@entity_type.manager']

  recipeboxx_recipe.nutrition_calculator:
    class: Drupal\recipeboxx_recipe\Service\NutritionCalculatorService

  # Phase 2: Social Features Services
  recipeboxx_recipe.share:
    class: Drupal\recipeboxx_recipe\Service\RecipeShareService

  # Phase 4: Shopping Lists and Meal Planning Services
  recipeboxx_recipe.ingredient_parser:
    class: Drupal\recipeboxx_recipe\Service\IngredientParserService

  recipeboxx_recipe.shopping_list:
    class: Drupal\recipeboxx_recipe\Service\ShoppingListService
    arguments: ['@entity_type.manager', '@current_user', '@recipeboxx_recipe.ingredient_parser']

  recipeboxx_recipe.meal_plan:
    class: Drupal\recipeboxx_recipe\Service\MealPlanService
    arguments: ['@entity_type.manager', '@current_user', '@recipeboxx_recipe.shopping_list']

  # Phase 3: Recipe Collections Service
  recipeboxx_recipe.collection:
    class: Drupal\recipeboxx_recipe\Service\RecipeCollectionService
    arguments: ['@entity_type.manager', '@current_user']

  # Phase 5: Advanced Features Services
  recipeboxx_recipe.scaling:
    class: Drupal\recipeboxx_recipe\Service\RecipeScalingService
    arguments: ['@recipeboxx_recipe.ingredient_parser']

  recipeboxx_recipe.export:
    class: Drupal\recipeboxx_recipe\Service\RecipeExportService
    arguments: ['@entity_type.manager', '@file_system', '@logger.factory', '@recipeboxx_recipe.scaling']
