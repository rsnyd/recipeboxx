  defaults:
    _entity_form: 'shopping_list.edit'
    _title: 'Edit Shopping List'
  requirements:
    _entity_access: 'shopping_list.update'
  options:
    parameters:
      shopping_list:
        type: 'entity:shopping_list'

recipeboxx_recipe.shopping_list_delete:
  path: '/shopping-list/{shopping_list}/delete'
  defaults:
    _entity_form: 'shopping_list.delete'
    _title: 'Delete Shopping List'
  requirements:
    _entity_access: 'shopping_list.delete'
  options:
    parameters:
      shopping_list:
        type: 'entity:shopping_list'

recipeboxx_recipe.shopping_list_print:
  path: '/shopping-list/{shopping_list}/print'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\ShoppingListController::printShoppingList'
    _title: 'Print Shopping List'
  requirements:
    _entity_access: 'shopping_list.view'
  options:
    parameters:
      shopping_list:
        type: 'entity:shopping_list'
    no_cache: TRUE

# Phase 4: Meal Plan Routes
recipeboxx_recipe.meal_plans:
  path: '/my/meal-plans'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\MealPlanController::listMealPlans'
    _title: 'My Meal Plans'
  requirements:
    _permission: 'create meal plans'

recipeboxx_recipe.meal_plan_current:
  path: '/meal-plan/current'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\MealPlanController::currentWeek'
    _title: 'This Week'
  requirements:
    _permission: 'create meal plans'

recipeboxx_recipe.meal_plan_view:
  path: '/meal-plan/{meal_plan}'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\MealPlanController::viewMealPlan'
    _title_callback: '\Drupal\recipeboxx_recipe\Entity\MealPlan::getName'
  requirements:
    _entity_access: 'meal_plan.view'
  options:
    parameters:
      meal_plan:
        type: 'entity:meal_plan'

recipeboxx_recipe.meal_plan_edit:
  path: '/meal-plan/{meal_plan}/edit'
  defaults:
    _entity_form: 'meal_plan.edit'
    _title: 'Edit Meal Plan'
  requirements:
    _entity_access: 'meal_plan.update'
  options:
    parameters:
      meal_plan:
        type: 'entity:meal_plan'

recipeboxx_recipe.meal_plan_generate_list:
  path: '/meal-plan/{meal_plan}/generate-shopping-list'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\MealPlanController::generateShoppingList'
  requirements:
    _entity_access: 'meal_plan.view'
    _csrf_token: 'TRUE'
  options:
    parameters:
      meal_plan:
        type: 'entity:meal_plan'

# Phase 3: Recipe Collection Routes
recipeboxx_recipe.collections:
  path: '/my/collections'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeCollectionController::listCollections'
