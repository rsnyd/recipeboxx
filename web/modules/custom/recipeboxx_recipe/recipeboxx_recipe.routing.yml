    _entity_access: 'recipe_collection.delete'
  options:
    parameters:
      recipe_collection:
        type: 'entity:recipe_collection'

recipeboxx_recipe.collection_add_recipe:
  path: '/recipe/{node}/add-to-collection'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeCollectionController::addToCollection'
  requirements:
    _permission: 'create recipe collections'
    _csrf_token: 'TRUE'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

recipeboxx_recipe.collection_remove_recipe:
  path: '/collection/{recipe_collection}/remove/{node}'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeCollectionController::removeFromCollection'
  requirements:
    _entity_access: 'recipe_collection.update'
    _csrf_token: 'TRUE'
    node: \d+
  options:
    parameters:
      recipe_collection:
        type: 'entity:recipe_collection'
      node:
        type: entity:node

