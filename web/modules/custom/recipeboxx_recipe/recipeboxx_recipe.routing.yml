recipeboxx_recipe.import:
  path: '/recipe/import'
  defaults:
    _form: '\Drupal\recipeboxx_recipe\Form\RecipeImportForm'
    _title: 'Import Recipe from URL'
  requirements:
    _permission: 'import recipes from url'

recipeboxx_recipe.bulk_import:
  path: '/recipe/bulk-import'
  defaults:
    _form: '\Drupal\recipeboxx_recipe\Form\RecipeBulkImportForm'
    _title: 'Bulk Import Recipes'
  requirements:
    _permission: 'import recipes from url'

recipeboxx_recipe.clone:
  path: '/recipe/{node}/clone'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeCloneController::clone'
    _title: 'Clone Recipe'
  requirements:
    _custom_access: '\Drupal\recipeboxx_recipe\Access\RecipeCloneAccessCheck::access'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

recipeboxx_recipe.settings:
  path: '/admin/config/recipeboxx/settings'
  defaults:
    _form: '\Drupal\recipeboxx_recipe\Form\RecipeSettingsForm'
    _title: 'Recipe Box Settings'
  requirements:
    _permission: 'administer site configuration'

recipeboxx_recipe.print_options:
  path: '/recipe/{node}/print-options'
  defaults:
    _form: '\Drupal\recipeboxx_recipe\Form\RecipePrintOptionsForm'
    _title: 'Print Options'
  requirements:
    _entity_access: 'node.view'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

recipeboxx_recipe.print_view:
  path: '/recipe/{node}/print'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipePrintController::printView'
    _title: 'Print Recipe'
  requirements:
    _entity_access: 'node.view'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node
    no_cache: TRUE

# Phase 1: Search Routes
recipeboxx_recipe.search:
  path: '/recipes/search'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeSearchController::searchPage'
    _title_callback: '\Drupal\recipeboxx_recipe\Controller\RecipeSearchController::searchPageTitle'
  requirements:
    _permission: 'access content'

recipeboxx_recipe.popular:
  path: '/recipes/popular'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeSearchController::popularRecipes'
    _title: 'Popular Recipes'
  requirements:
    _permission: 'access content'

recipeboxx_recipe.recent:
  path: '/recipes/recent'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeSearchController::recentRecipes'
    _title: 'Recent Recipes'
  requirements:
    _permission: 'access content'

recipeboxx_recipe.top_rated:
  path: '/recipes/top-rated'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeSearchController::topRatedRecipes'
    _title: 'Top Rated Recipes'
  requirements:
    _permission: 'access content'

recipeboxx_recipe.photo_upload:
  path: '/recipe/{node}/photos/add'
  defaults:
    _form: '\Drupal\recipeboxx_recipe\Form\RecipePhotoUploadForm'
    _title: 'Upload Recipe Photo'
  requirements:
    _entity_access: 'node.update'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

# Phase 2: Recipe Notes Routes
recipeboxx_recipe.note_view:
  path: '/recipe/{node}/note'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeNoteController::viewNote'
    _title: 'My Note'
  requirements:
    _permission: 'create recipe notes'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

recipeboxx_recipe.note_add:
  path: '/recipe/{node}/note/add'
  defaults:
    _entity_form: 'recipe_note.add'
    _title: 'Add Note'
  requirements:
    _permission: 'create recipe notes'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

recipeboxx_recipe.note_edit:
  path: '/recipe-note/{recipe_note}/edit'
  defaults:
    _entity_form: 'recipe_note.edit'
    _title: 'Edit Note'
  requirements:
    _entity_access: 'recipe_note.update'
  options:
    parameters:
      recipe_note:
        type: 'entity:recipe_note'

# Phase 2: I Made This Routes
recipeboxx_recipe.made_it_toggle:
  path: '/recipe/{node}/made-it/toggle'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeMadeItController::toggle'
  requirements:
    _permission: 'access content'
    _csrf_token: 'TRUE'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

# Phase 4: Shopping List Routes
recipeboxx_recipe.shopping_lists:
  path: '/my/shopping-lists'
