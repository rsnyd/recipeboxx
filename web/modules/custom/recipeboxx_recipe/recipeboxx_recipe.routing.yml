    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeCollectionController::browsePublicCollections'
    _title: 'Browse Public Collections'
  requirements:
    _permission: 'view public collections'

entity.recipe_collection.canonical:
  path: '/collection/{recipe_collection}'
  defaults:
    _controller: '\Drupal\recipeboxx_recipe\Controller\RecipeCollectionController::viewCollection'
    _title_callback: '\Drupal\recipeboxx_recipe\Entity\RecipeCollection::getName'
  requirements:
    _entity_access: 'recipe_collection.view'
  options:
    parameters:
      recipe_collection:
        type: 'entity:recipe_collection'

entity.recipe_collection.add_form:
  path: '/collection/add'
  defaults:
    _entity_form: 'recipe_collection.add'
    _title: 'Create Collection'
  requirements:
    _permission: 'create recipe collections'

entity.recipe_collection.edit_form:
  path: '/collection/{recipe_collection}/edit'
  defaults:
    _entity_form: 'recipe_collection.edit'
    _title: 'Edit Collection'
  requirements:
    _entity_access: 'recipe_collection.update'
  options:
    parameters:
      recipe_collection:
        type: 'entity:recipe_collection'

entity.recipe_collection.delete_form:
  path: '/collection/{recipe_collection}/delete'
  defaults:
    _entity_form: 'recipe_collection.delete'
    _title: 'Delete Collection'
