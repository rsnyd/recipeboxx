create recipe content:
  title: 'Create new recipes'
  description: 'Allow users to create their own recipes'

edit own recipe content:
  title: 'Edit own recipes'
  description: 'Allow users to edit their own recipes'

delete own recipe content:
  title: 'Delete own recipes'
  description: 'Allow users to delete their own recipes'

view public recipes:
  title: 'View public recipes'
  description: 'Allow users to view recipes marked as public'

clone public recipes:
  title: 'Clone public recipes'
  description: 'Allow users to clone public recipes to their collection'

import recipes from url:
  title: 'Import recipes from URL'
  description: 'Allow users to import recipes by pasting URLs'

# Recipe note permissions
create recipe notes:
  title: 'Create recipe notes'
  description: 'Create personal notes for recipes'

administer recipe notes:
  title: 'Administer recipe notes'
  description: 'Administer all recipe notes'
  restrict access: true

# Shopping list permissions
create shopping lists:
  title: 'Create shopping lists'
  description: 'Create and manage personal shopping lists'

administer shopping lists:
  title: 'Administer shopping lists'
  description: 'Administer all shopping lists'
  restrict access: true

# Meal plan permissions
create meal plans:
  title: 'Create meal plans'
  description: 'Create and manage weekly meal plans'

administer meal plans:
  title: 'Administer meal plans'
  description: 'Administer all meal plans'
  restrict access: true

# Collection permissions
create recipe collections:
  title: 'Create recipe collections'
  description: 'Create and manage recipe collections/cookbooks'

edit own recipe collections:
  title: 'Edit own recipe collections'
  description: 'Edit own recipe collections'

view public collections:
  title: 'View public recipe collections'
  description: 'View recipe collections marked as public'

